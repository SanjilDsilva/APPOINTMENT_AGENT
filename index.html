<!DOCTYPE html>
<html>
<head>
    <title>Clinic AI Agent</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        #chat-box { height: 500px; border: 1px solid #e0e0e0; overflow-y: scroll; padding: 15px; margin-bottom: 10px; border-radius: 8px; background: #fafafa; }
        .msg { margin: 10px 0; padding: 12px 16px; border-radius: 8px; line-height: 1.4; }
        .user { background: #007bff; color: white; text-align: left; margin-left: 20%; border-bottom-right-radius: 2px; }
        .ai { background: #ffffff; border: 1px solid #e0e0e0; text-align: left; margin-right: 20%; border-bottom-left-radius: 2px; }
        #input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: #007bff; }
        button { padding: 12px 24px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h2>Clinic Scheduling Assistant</h2>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your message..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        // Generate a random session ID on page load so refreshing clears the AI's memory
        const sessionId = "session_" + Math.random().toString(36).substring(2, 9);
        const chatBox = document.getElementById("chat-box");
        const input = document.getElementById("user-input");

        function addMessage(text, sender) {
            const div = document.createElement("div");
            div.className = `msg ${sender}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, "user");
            input.value = "";

            try {
                // Send the payload to your exact FastAPI endpoint
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ session_id: sessionId, message: message })
                });
                const data = await response.json();
                
                // Handle the backend guardrail string or standard reply
                if (data.reply) {
                    addMessage(data.reply, "ai");
                } else if (data.error) {
                    addMessage("System Error: " + data.error, "ai");
                }
            } catch (error) {
                addMessage("Error connecting to server.", "ai");
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }
        
        addMessage("Hello! I am the clinic assistant. How can I help you today?", "ai");
    </script>
</body>
</html>
