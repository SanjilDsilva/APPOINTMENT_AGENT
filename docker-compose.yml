version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: clinic_db
    ports:
      - "5432:5432"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # This points to the Docker database, overriding your local .env
      - DATABASE_URL=postgresql://admin:password123@db:5432/clinic_db
      # Pulls your API key from your local machine environment
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db